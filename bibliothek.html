<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weiterleitung — Vorlagen · pilot AI Marketplace</title>
  <meta name="robots" content="noindex, follow">
  <!-- E11-IA: Die Asset-Bibliothek ist im Bereich „Vorlagen" (vorlagen.html, Tab
       Design-Assets) aufgegangen. Diese Seite hält Bookmarks und Deep-Links am
       Leben: ?a=/?f= und #a/… werden 1:1 übergeben; ohne Parameter landet man
       auf dem Assets-Tab. <meta refresh> ist der Fallback ohne JS. -->
  <script>
    (function () {
      try {
        var q = window.location.search || '';
        var h = window.location.hash || '';
        if (!/[?&]tab=/.test(q)) q = q ? q + '&tab=assets' : '?tab=assets';
        window.location.replace('vorlagen.html' + q + h);
      } catch (e) {}
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=vorlagen.html?tab=assets">
  <link rel="stylesheet" href="shared/base.css">
  <style>
    .redirect-note { max-width: 52ch; margin: 18vh auto 0; padding: 0 2.4rem; text-align: center; }
    .redirect-note h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: 1.2rem; }
    .redirect-note p { font-size: 1.6rem; line-height: 1.6; color: var(--c-ink-body); }
    .redirect-note a { color: var(--c-black); font-weight: 600; }
  </style>
</head>
<body>
  <main class="redirect-note">
    <h1>Die Asset-Bibliothek ist umgezogen</h1>
    <p>Design-Assets findest du jetzt im Bereich <strong>Vorlagen</strong>. Du wirst automatisch weitergeleitet — falls nicht, geht es <a href="vorlagen.html?tab=assets">hier direkt weiter</a>.</p>
  </main>
</body>
</html>
