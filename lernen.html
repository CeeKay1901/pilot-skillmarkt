<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weiterleitung — Lernen &amp; Hilfe · pilot AI Marketplace</title>
  <meta name="robots" content="noindex, follow">
  <!-- E10-Merge: Der Lern-Bereich ist in „Lernen & Hilfe" (lernen-hilfe.html) aufgegangen.
       Diese Seite ist nur noch eine Weiterleitung, die Bookmarks und Deep-Links am Leben
       hält: ?r= wird 1:1 an die neue Seite übergeben (sie macht daraus die kanonische
       Hash-Form). Die JS-Weiterleitung erhält die Query-Parameter; das <meta refresh> ist
       der Fallback ohne JS (dann ohne Parameter auf die Startsektion). -->
  <script>
    (function () {
      try {
        var q = window.location.search || '';
        var h = window.location.hash || '';
        window.location.replace('lernen-hilfe.html' + q + h);
      } catch (e) {}
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=lernen-hilfe.html#ressourcen">
  <link rel="stylesheet" href="shared/base.css">
  <style>
    .redirect-note { max-width: 52ch; margin: 18vh auto 0; padding: 0 2.4rem; text-align: center; }
    .redirect-note h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: 1.2rem; }
    .redirect-note p { font-size: 1.6rem; line-height: 1.6; color: var(--c-ink-body); }
    .redirect-note a { color: var(--c-black); font-weight: 600; }
  </style>
</head>
<body>
  <main class="redirect-note">
    <h1>Wir haben den Lern-Bereich umgezogen</h1>
    <p>Er lebt jetzt zusammen mit dem Hilfe-Center unter <strong>Lernen &amp; Hilfe</strong>. Du wirst automatisch weitergeleitet — falls nicht, geht es <a href="lernen-hilfe.html#ressourcen">hier direkt weiter</a>.</p>
  </main>
</body>
</html>
